name: CI

on:
  pull_request:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.14

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Ruff
        run: uv run ruff format . --check

      - name: Pyright
        run: uv run pyright

      - name: Isort
        run: uv run isort . --check
